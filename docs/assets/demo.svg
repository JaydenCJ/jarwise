<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="430" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">jarwise — which browser rule eats your cookie</text>

  <text x="24" y="64" fill="#7ee787">$ jarwise send --set 'https://app.example.test/ =&gt; sid=abc; Secure; SameSite=Lax' \</text>
  <text x="24" y="82" fill="#7ee787">    --url https://app.example.test/api --from https://news.example/ --subresource</text>

  <text x="24" y="112" fill="#c9d1d9">send GET https://app.example.test/api</text>
  <text x="24" y="130" fill="#8b949e">  from https://news.example/ (cross-site, subresource)</text>

  <text x="24" y="160" fill="#c9d1d9">  sid (host app.example.test, path /)</text>
  <text x="24" y="180" fill="#c9d1d9">    <tspan fill="#3fb950">ok</tspan>  send.host-only     the request host matches exactly</text>
  <text x="24" y="198" fill="#c9d1d9">    <tspan fill="#3fb950">ok</tspan>  send.path-match    /api path-matches cookie path /</text>
  <text x="24" y="216" fill="#c9d1d9">    <tspan fill="#3fb950">ok</tspan>  send.secure        Secure cookie on an https request</text>
  <text x="24" y="234" fill="#c9d1d9">    <tspan fill="#f85149">X!</tspan>  send.samesite      SameSite=Lax blocks cross-site subresource requests</text>
  <text x="24" y="252" fill="#8b949e">                           (fetch/XHR/img/iframe)  [RFC 6265bis §5.8.3]</text>
  <text x="24" y="272" fill="#d29922">    → omitted</text>

  <text x="24" y="302" fill="#c9d1d9">Cookie: (nothing sent)</text>
  <text x="24" y="322" fill="#c9d1d9">jarwise: <tspan fill="#f85149">BLOCKED</tspan> — 0 of 1 cookie attached  <tspan fill="#8b949e">exit 1</tspan></text>

  <text x="24" y="356" fill="#7ee787">$ jarwise trace examples/cross-site-sso.json</text>
  <text x="24" y="376" fill="#c9d1d9">hop 1: POST https://app.example.test/sso/callback (cross-site)</text>
  <text x="24" y="394" fill="#d29922">    omitted session — SameSite=Lax (defaulted) blocks cross-site POST navigations</text>
  <text x="24" y="412" fill="#c9d1d9">hop 2: GET  …/home (after 303) — Cookie: session=e91bd0  <tspan fill="#3fb950">back after the 303</tspan></text>
</svg>
